# scenario-test 共通設定 (テンプレート)
#
# 使い方:
#   cp config.example.yaml config.yaml
#   uv run scenario-test --config config.yaml --workers 4
#
# config.yaml は .gitignore 対象 (認証情報を含むため)。
# 個別のテストケース定義は testcases/ 配下の YAML を参照。

# --- 接続先 ----------------------------------------------------------
target:
  base_url: https://example.com

  # サイト全体に Basic 認証が掛かっている場合のみ指定 (掛かっていなければ削除可)。
  # 省略時は空文字列が入り、role 側で `requires_basic_auth: true` を指定した
  # テストケースのみが Basic 認証ヘッダを要求する。
  # basic_auth:
  #   user: replace-me
  #   password: replace-me

# --- TLS 検査 (false で curl -k 相当) ---------------------------
verify_tls: false

# --- ロール別ログイン情報 ---------------------------------------
# テストケース YAML から `role: <id>` で参照する
roles:
  admin:
    label: 管理者
    login:
      path: /admin/login
      requires_basic_auth: true   # /admin/ 配下のみ Basic 認証ゲートが掛かる場合
      fields:
        LoginID: admin@example.com
        Password: replace-me
      # 任意: 独自フォーム名がある場合の優先セレクタ。省略時は role/type=submit
      # の汎用フォールバックを runner が試行する。
      # submit_selectors:
      #   - 'form[name="MyAdminLoginForm"] button[type="submit"]'
      # ログイン成功判定: URL がこの文字列を含めば「失敗」とみなす
      fail_if_url_contains: /admin/login

  user:
    label: 一般ユーザ
    login:
      path: /user/login
      requires_basic_auth: false
      fields:
        LoginID: user@example.com
        Password: replace-me
      fail_if_url_contains: /user/login

# --- Playwright 設定 -----------------------------------------------
playwright:
  headless: true
  # 1280x720 = HD 720p (16:9)。Google Drive のプレイヤが transcoding 不要で
  # 即時再生しやすい標準解像度。video_size と必ず一致させる。
  viewport:
    width: 1280
    height: 720
  # Playwright の slow_mo: 1 操作ごとに ms 待機 (内部的なクリック・入力ごと)
  slow_mo_ms: 0
  video_size:
    width: 1280
    height: 720
  navigation_timeout_ms: 30000
  # 各ナビゲーション完了後にこの ms だけ待機する。動画で遷移が一瞬で過ぎないように
  # 表示時間を稼ぐ。0 にすると待機なし。CI で速度優先なら 0、エビデンス重視なら
  # 1500〜3000 程度を推奨。
  step_delay_ms: 1800
  # 動画にカーソル丸印 + 字幕オーバーレイ (直前/次へ の 2 行) を焼き込む
  enable_overlay: true
  # Playwright Trace (trace.zip) を出力する。 `playwright show-trace trace.zip`
  # でクリック箇所のハイライト・DOM スナップショット・コンソールを対話確認可能。
  enable_trace: true
  # 録画動画のフォーマット: "mp4" 推奨 (Google Drive プレビュアで再生互換性が高い)。
  # "webm" にすると変換せず Playwright 既定の webm のまま。
  video_format: mp4

# --- 並列実行ランナー設定 ------------------------------------------
runner:
  workers: 4
  testcases_dir: ./testcases

# --- 許容する console.error / pageerror パターン (省略可) -------------
# docs/checklists/checklist-common.md C8 では console.error / pageerror が
# 1 件でも出たら無条件 FAIL だが、3rd party SDK の既知 warning など
# プロジェクト責任外の noise を許容したい場合に正規表現で除外できる (C9)。
# マッチした行は集計から除かれ、FAIL 判定にも寄与しない。
tolerated_console_errors: []
tolerated_page_errors: []
# 例:
# tolerated_console_errors:
#   - "Failed to load resource: the server responded with a status of 404"
#   - "ResizeObserver loop limit exceeded"
# tolerated_page_errors:
#   - "ChunkLoadError"

# --- a11y (axe-core) 自動スキャン (v0.3.0) ----------------------------
# page_role が auto_roles にマッチする testcase で 1 回 axe-core を実行する。
# 違反があれば fail_on_violations=true なら FAIL、false なら情報のみ。
a11y:
  enabled: true
  auto_roles: [lp, list, form, dashboard, cart, checkout, settings, auth]
  tags: [wcag2a, wcag2aa, wcag21aa, wcag22aa]
  fail_on_violations: true

# --- Core Web Vitals 自動計測 (v0.3.0) --------------------------------
# page_role が auto_roles にマッチする testcase で 1 回 LCP/CLS/TTFB/longest_task
# を 5 秒観察する。poor 判定が 1 件でもあれば fail_on_poor=true なら FAIL。
cwv:
  enabled: true
  auto_roles: [lp, list, dashboard, search]
  observe_ms: 5000
  fail_on_poor: true

# --- レポート設定 (省略可) -------------------------------------------
# render_report が見出し・計画書リンク・Phase ラベルに使う。
report:
  title: "シナリオ E2E テスト 実施報告書"
  test_plan_link: "./test-plan.md"
  # phase 番号 → セクション見出し (未定義 phase は "phase {N}" で表示)
  phase_labels:
    # 0: "疎通検査 (curl)"
    # 10: "管理者シナリオ"
    # 20: "一般ユーザシナリオ"
