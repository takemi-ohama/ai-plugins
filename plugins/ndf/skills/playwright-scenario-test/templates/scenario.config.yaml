# scenario-test 共通設定 (pytest-playwright)
#
# 使い方:
#   cp scenario.config.yaml ./scenario.config.yaml
#   uv run pytest --ndf-config=./scenario.config.yaml
#
# pytest が起動する CWD に置けば ``--ndf-config`` 省略も可能。
# 認証情報を含むため .gitignore 推奨。
#
# ⚠️ 認証情報の管理:
#   YAML に直接書かず ${ENV_VAR} / ${ENV_VAR:-default} で参照してください。
#   .env ファイルや shell export で環境変数を設定して使用します。
#   例: export ADMIN_PASSWORD=secret  または  direnv / .env ファイルを活用

# --- 接続先 ----------------------------------------------------------
target:
  base_url: https://example.com

  # サイト全体に Basic 認証が掛かっている場合のみ指定 (掛かっていなければ削除可)。
  # 省略時は空文字列が入り、role 側で `requires_basic_auth: true` を指定した
  # role のみが Basic 認証ヘッダを要求する。
  # basic_auth:
  #   user: ${BASIC_AUTH_USER}
  #   password: ${BASIC_AUTH_PASSWORD}

# --- TLS 検査 (false で curl -k 相当) ---------------------------
verify_tls: false

# --- ロール別ログイン情報 ---------------------------------------
# pytest テストから ``ndf_role_<id>`` fixture で参照する
roles:
  admin:
    label: 管理者
    login:
      path: /admin/login
      requires_basic_auth: true   # /admin/ 配下のみ Basic 認証ゲートが掛かる場合
      fields:
        # 認証情報は環境変数で管理する (YAML 直書き禁止)
        # export ADMIN_LOGIN_ID=admin@example.com
        # export ADMIN_PASSWORD=secret
        LoginID: ${ADMIN_LOGIN_ID}
        Password: ${ADMIN_PASSWORD}
      # 任意: 独自フォーム名がある場合の優先セレクタ。省略時は role/type=submit
      # の汎用フォールバックを fixture が試行する。
      # submit_selectors:
      #   - 'form[name="MyAdminLoginForm"] button[type="submit"]'
      fail_if_url_contains: /admin/login

  user:
    label: 一般ユーザ
    login:
      path: /user/login
      requires_basic_auth: false
      fields:
        # export USER_LOGIN_ID=user@example.com
        # export USER_PASSWORD=secret
        LoginID: ${USER_LOGIN_ID}
        Password: ${USER_PASSWORD}
      fail_if_url_contains: /user/login

# --- Playwright 設定 -----------------------------------------------
playwright:
  headless: true
  # 1280x720 = HD 720p (16:9)。Google Drive のプレイヤで transcoding 不要で
  # 即時再生しやすい標準解像度。video_size と必ず一致させる。
  viewport:
    width: 1280
    height: 720
  slow_mo_ms: 0
  video_size:
    width: 1280
    height: 720
  navigation_timeout_ms: 30000
  # 各ナビゲーション完了後にこの ms だけ待機する (動画用)。
  step_delay_ms: 1800
  enable_overlay: true
  enable_trace: true
  # mp4 推奨 (Drive プレビュアで再生互換性が高い)。webm にすると変換せず保存。
  video_format: mp4

# --- 許容する console.error / pageerror パターン -------------
# 3rd party SDK の既知 warning など、プロジェクト責任外の noise を許容するときに
# 正規表現で除外できる。マッチした行は ``ndf_evidence`` の集計から除かれる。
tolerated_console_errors: []
tolerated_page_errors: []
# 例:
# tolerated_console_errors:
#   - "Failed to load resource: the server responded with a status of 404"
#   - "ResizeObserver loop limit exceeded"
# tolerated_page_errors:
#   - "ChunkLoadError"

# --- a11y (axe-core) 自動スキャン ------------------------------------
# ``@pytest.mark.page_role("form")`` 等が付いた test の終了直前に axe-core を
# 自動実行する (page_role が auto_roles にマッチした場合のみ)。
a11y:
  enabled: true
  auto_roles: [lp, list, form, dashboard, cart, checkout, settings, auth]
  tags: [wcag2a, wcag2aa, wcag21aa, wcag22aa]
  fail_on_violations: true

# --- Core Web Vitals 自動計測 ----------------------------------------
# page_role が auto_roles にマッチする test の終了直前に LCP/CLS/TTFB/longest_task
# を observe_ms ミリ秒観察する。poor が 1 件でもあれば fail_on_poor=true なら FAIL。
cwv:
  enabled: true
  auto_roles: [lp, list, dashboard, search]
  observe_ms: 5000
  fail_on_poor: true

# --- レポート設定 -----------------------------------------------------
# pytest_terminal_summary が ``reports/<run-id>/report.md`` に書き出す
# Markdown のタイトル等。
report:
  title: "シナリオ E2E テスト 実施報告書"
  test_plan_link: "./test-plan.md"
  phase_labels: {}
